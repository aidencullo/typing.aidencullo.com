<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>acullo | typing stats</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #232323;
      color: #d1d0c5;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    h1 {
      font-size: 1rem;
      color: #646669;
      letter-spacing: 0.15em;
      margin-bottom: 2rem;
    }

    .stats {
      display: flex;
      gap: 4rem;
      align-items: flex-end;
    }

    .stat {
      text-align: center;
    }

    .stat .value {
      font-size: 6rem;
      font-weight: bold;
      color: #e2b714;
      line-height: 1;
    }

    .stat .label {
      font-size: 0.75rem;
      color: #646669;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 0.6rem;
    }

    #status {
      color: #646669;
      font-size: 0.85rem;
      margin-top: 2rem;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      color: #3c3c3c;
      font-size: 0.7rem;
    }

    footer a { color: #646669; text-decoration: none; }
  </style>
</head>
<body>
  <h1>acullo</h1>

  <div class="stats">
    <div class="stat">
      <div class="value" id="wpm">—</div>
      <div class="label">wpm</div>
    </div>
    <div class="stat">
      <div class="value" id="acc">—</div>
      <div class="label">accuracy</div>
    </div>
  </div>

  <div id="status">loading...</div>

  <footer>
    <a href="https://monkeytype.com/profile/acullo" target="_blank">monkeytype</a>
  </footer>

  <script>
    async function load() {
      try {
        const res = await fetch('https://api.monkeytype.com/users/acullo/profile');
        if (!res.ok) throw new Error();
        const { data } = await res.json();

        const pb = data.personalBests ?? {};
        const wpms = [], accs = [];

        for (const modeObj of Object.values(pb)) {
          for (const entries of Object.values(modeObj)) {
            if (!entries.length) continue;
            const best = entries.reduce((a, b) => b.wpm > a.wpm ? b : a);
            wpms.push(best.wpm);
            if (best.acc != null) accs.push(best.acc);
          }
        }

        document.getElementById('wpm').textContent = wpms.length
          ? Math.round(wpms.reduce((a, b) => a + b) / wpms.length)
          : '—';
        document.getElementById('acc').textContent = accs.length
          ? Math.round(accs.reduce((a, b) => a + b) / accs.length) + '%'
          : '—';
        document.getElementById('status').textContent = '';

      } catch {
        document.getElementById('status').textContent = 'could not load stats';
      }
    }

    load();
  </script>
</body>
</html>
